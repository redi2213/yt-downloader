name: Download Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
      format_id:
        description: 'Format id (e.g. 337) or bestaudio for audio-only'
        required: true
        default: 'bestvideo+bestaudio'
      audio_only:
        description: 'true for audio-only MP3'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: denoland/setup-deno@v2

      - name: Install yt-dlp, ffmpeg, aria2
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2
          pip install -U yt-dlp

      - name: Write cookies file
        run: echo "${{ secrets.YTDLP_COOKIES }}" > cookies.txt

      - name: Download
        id: dl
        run: |
          OUTTMPL="%(title).120s.%(ext)s"
          COMMON_SPEED_FLAGS="--downloader aria2c --downloader-args aria2c:-x16_-s16_-k1M"

          if [ "${{ github.event.inputs.audio_only }}" = "true" ]; then
            yt-dlp --cookies cookies.txt --remote-components ejs:github \
              --restrict-filenames $COMMON_SPEED_FLAGS \
              -x --audio-format mp3 \
              -o "$OUTTMPL" \
              --print-to-file after_move:filepath filename.txt \
              "${{ github.event.inputs.video_url }}"
            QUALITY="audio"
          else
            yt-dlp --cookies cookies.txt --remote-components ejs:github \
              --restrict-filenames $COMMON_SPEED_FLAGS \
              -f "${{ github.event.inputs.format_id }}+bestaudio/best" \
              --merge-output-format mkv \
              -o "$OUTTMPL" \
              --print-to-file after_move:filepath filename.txt \
              --print-to-file after_move:"%(height)s|%(dynamic_range)s|%(fps)s" metadata.txt \
              "${{ github.event.inputs.video_url }}"

            METADATA=$(cat metadata.txt)
            IFS='|' read -r HEIGHT HDR FPS <<< "$METADATA"

            if [ "$HEIGHT" = "NA" ] || [ -z "$HEIGHT" ]; then
              QUALITY="unknown"
            else
              FPS_SUFFIX=""
              if [ "$FPS" != "NA" ] && [ -n "$FPS" ]; then
                FPS_SUFFIX="_${FPS%.*}fps"
              fi
              HDR_SUFFIX=""
              if [ "$HDR" != "SDR" ] && [ "$HDR" != "NA" ] && [ -n "$HDR" ]; then
                HDR_SUFFIX="_HDR"
              fi
              QUALITY="${HEIGHT}p${FPS_SUFFIX}${HDR_SUFFIX}"
            fi
          fi

          FILENAME=$(cat filename.txt)
          BASENAME="${FILENAME%.*}"
          EXT="${FILENAME##*.}"
          FINAL_NAME="${BASENAME}_[${QUALITY}].${EXT}"
          mv "$FILENAME" "$FINAL_NAME"
          echo "filename=$FINAL_NAME" >> $GITHUB_OUTPUT

      - name: Clean up cookies
        if: always()
        run: rm -f cookies.txt filename.txt metadata.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: ${{ steps.dl.outputs.filename }}
          retention-days: 1

      - name: Create Release with direct link
        uses: softprops/action-gh-release@v2
        with:
          tag_name: run-${{ github.run_id }}
          files: ${{ steps.dl.outputs.filename }}
          prerelease: true
          name: "Download run-${{ github.run_id }}"
