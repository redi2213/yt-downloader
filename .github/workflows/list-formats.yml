name: List Formats

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: List formats
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          yt-dlp -F "${{ github.event.inputs.video_url }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
