name: Download Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube URL'
        required: true
      format_id:
        description: 'Format id (e.g. 337) - will be merged with bestaudio'
        required: true
        default: 'bestvideo+bestaudio'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -U yt-dlp

      - name: Download and merge
        run: |
          yt-dlp -f "${{ github.event.inputs.format_id }}+bestaudio/best" \
            --merge-output-format mkv \
            -o "video.%(ext)s" \
            "${{ github.event.inputs.video_url }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-video
          path: video.mkv
          retention-days: 1
